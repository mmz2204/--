<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{toolName}} - AI工具盒子</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --primary: #6366f1;
            --primary2: #8b5cf6;
            --bg-dark: #0f0f1a;
            --bg-card: #1a1a2e;
            --bg-card-hover: #252540;
            --text: #ffffff;
            --text-secondary: #94a3b8;
            --border: #2d2d44;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-dark);
            min-height: 100vh;
            color: var(--text);
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 20px;
        }
        
        /* Header */
        header {
            padding: 20px 0;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            background: rgba(15, 15, 26, 0.95);
            backdrop-filter: blur(10px);
            z-index: 100;
        }
        
        .header-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: var(--text);
        }
        
        .logo-icon {
            font-size: 28px;
        }
        
        .logo-text {
            font-size: 18px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--primary2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .back-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            text-decoration: none;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        
        .back-btn:hover {
            background: var(--bg-card-hover);
            border-color: var(--primary);
        }
        
        /* Hero Section */
        .hero {
            padding: 30px 0;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .hero-top {
            display: flex;
            flex-wrap: wrap;
            align-items: flex-start;
            gap: 24px;
            justify-content: space-between;
        }
        
        .tool-content {
            flex: 1;
            min-width: 280px;
        }
        
        .tool-header {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .tool-icon {
            width: 70px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.2), rgba(139, 92, 246, 0.2));
            border-radius: 18px;
            border: 1px solid var(--border);
            flex-shrink: 0;
        }
        
        .tool-info {
            text-align: left;
        }
        
        .tool-name {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--primary2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 6px;
        }
        
        .tool-desc {
            font-size: 15px;
            color: var(--text-secondary);
            line-height: 1.8;
            max-width: 800px;
            margin: 12px 0 20px;
            text-align: left;
            padding: 16px 20px;
            background: rgba(99, 102, 241, 0.05);
            border-radius: 12px;
            border-left: 3px solid var(--primary);
        }
        
        .tool-badges {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 24px;
        }
        
        .badge {
            padding: 5px 14px;
            border-radius: 18px;
            font-size: 11px;
            font-weight: 500;
        }
        
        .badge.hot {
            background: linear-gradient(135deg, #f97316, #ef4444);
            color: #fff;
        }
        
        .badge.foreign {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: #fff;
        }
        
        .badge.domestic {
            background: linear-gradient(135deg, #10b981, #059669);
            color: #fff;
        }
        
        .usage-count {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 32px;
        }
        
        .action-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 32px;
            background: linear-gradient(135deg, var(--primary), var(--primary2));
            color: #fff;
            text-decoration: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.4);
        }
        
        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 30px rgba(99, 102, 241, 0.5);
        }
        
        .action-btn:active {
            transform: translateY(0);
        }
        
        /* Ad Section */
        .ad-section {
            margin: 20px 0 30px;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
        }
        
        .ad-link {
            text-decoration: none;
            color: inherit;
        }
        
        .ad-content {
            display: flex;
            align-items: center;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.1), rgba(139, 92, 246, 0.1));
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        
        .ad-content:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(99, 102, 241, 0.2);
            border-color: var(--primary);
        }
        
        .ad-image {
            flex-shrink: 0;
            width: 200px;
            height: 100px;
            overflow: hidden;
        }
        
        .ad-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .ad-text {
            flex: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .ad-text h3 {
            font-size: 18px;
            font-weight: 600;
            background: linear-gradient(135deg, var(--primary), var(--primary2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 0;
        }
        
        .ad-text p {
            font-size: 14px;
            color: var(--text-secondary);
            margin: 0;
            line-height: 1.5;
        }
        
        /* Related Tools */
        .related-section {
            margin: 20px 0;
        }
        
        .section-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
        }
        
        .section-title::before {
            content: '';
            width: 3px;
            height: 16px;
            background: linear-gradient(180deg, var(--primary), var(--primary2));
            border-radius: 2px;
        }
        
        .tools-grid {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding-bottom: 8px;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }
        
        .tools-grid::-webkit-scrollbar {
            height: 6px;
        }
        
        .tools-grid::-webkit-scrollbar-track {
            background: transparent;
        }
        
        .tools-grid::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }
        
        .tool-card {
            flex-shrink: 0;
            width: 140px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        
        .tool-card:hover {
            background: var(--bg-card-hover);
            border-color: var(--primary);
            transform: translateY(-2px);
        }
        
        .card-icon {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            background: rgba(99, 102, 241, 0.15);
            border-radius: 10px;
            margin-bottom: 10px;
        }
        
        .card-name {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .card-desc {
            font-size: 11px;
            color: var(--text-secondary);
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .card-badge {
            position: absolute;
            top: 8px;
            right: 8px;
            padding: 1px 6px;
            border-radius: 6px;
            font-size: 9px;
            font-weight: 600;
        }
        
        .card-badge.foreign {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: #fff;
        }
        
        /* Footer */
        footer {
            padding: 40px 0;
            border-top: 1px solid var(--border);
            margin-top: 60px;
        }
        
        .footer-content {
            text-align: center;
            color: var(--text-secondary);
            font-size: 14px;
        }
        
        .footer-links {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        
        .footer-links a {
            color: var(--text-secondary);
            text-decoration: none;
            transition: color 0.3s ease;
        }
        
        .footer-links a:hover {
            color: var(--primary);
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .hero {
                padding: 40px 0;
            }
            
            .tool-name {
                font-size: 28px;
            }
            
            .tool-desc {
                font-size: 15px;
            }
            
            .action-btn {
                padding: 12px 24px;
                font-size: 15px;
            }
            
            .tools-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="container header-content">
            <a href="/" class="logo">
                <span class="logo-icon">✨</span>
                <span class="logo-text">AI工具盒子</span>
            </a>
            <a href="/" class="back-btn">
                <span>←</span>
                <span>返回首页</span>
            </a>
        </div>
    </header>

    <main class="container">
        <section class="hero">
            <div class="hero-top">
                <div class="tool-header">
                    <div class="tool-icon" id="tool-icon">🤖</div>
                    <div class="tool-info">
                        <h1 class="tool-name" id="tool-name">工具名称</h1>
                    </div>
                </div>
                
                <a href="#" class="action-btn" id="action-btn" target="_blank" rel="noopener noreferrer">
                    <span>🚀</span>
                    <span>使用入口</span>
                </a>
            </div>
            
            <p class="tool-desc" id="tool-desc">工具描述将显示在这里，大约100字左右，介绍该工具的主要功能和特点。</p>
            
            <div class="tool-badges" id="tool-badges"></div>
        </section>

        <!-- 广告预留区域 -->
        <section class="ad-section">
            <a href="/" class="ad-link">
                <div class="ad-content">
                    <div class="ad-image">
                        <img src="https://neeko-copilot.bytedance.net/api/text2image?prompt=futuristic%20AI%20technology%20abstract%20background%20with%20glowing%20purple%20and%20blue%20lights%20digital%20gradient%20modern%20minimalist&image_size=landscape_16_9" alt="AI工具盒子">
                    </div>
                    <div class="ad-text">
                        <h3>✨ AI工具盒子</h3>
                        <p>汇聚全网优质AI工具，助力高效工作与创作</p>
                    </div>
                </div>
            </a>
        </section>

        <!-- 相关工具推荐 -->
        <section class="related-section">
            <h2 class="section-title">推荐工具</h2>
            <div class="tools-grid" id="related-tools">
                <!-- 动态加载相关工具 -->
            </div>
        </section>
    </main>

    <footer>
        <div class="container footer-content">
            <div class="footer-links">
                <a href="#">关于我们</a>
                <a href="#">使用协议</a>
                <a href="#">隐私政策</a>
                <a href="#">联系我们</a>
            </div>
            <p>© 2024 AI工具盒子 - 汇聚优质AI工具</p>
        </div>
    </footer>

    <script>
        // 获取URL参数
        function getParam(name) {
            const params = new URLSearchParams(window.location.search);
            return params.get(name);
        }

        // 获取工具数据
        async function loadToolsData() {
            try {
                const response = await fetch('/data.json');
                const data = await response.json();
                return data.tools || [];
            } catch (error) {
                console.error('加载工具数据失败:', error);
                return [];
            }
        }

        // 渲染页面
        async function renderPage() {
            const toolsData = await loadToolsData();
            
            // 获取当前工具ID
            const toolId = getParam('id');
            
            if (!toolId) {
                window.location.href = '/';
                return;
            }
            
            // 查找当前工具
            const currentTool = toolsData.find(t => t.id == toolId);
            
            if (!currentTool) {
                window.location.href = '/';
                return;
            }
            
            // 设置页面标题
            document.title = currentTool.name + ' - AI工具盒子';
            
            // 渲染当前工具信息
            document.getElementById('tool-icon').textContent = currentTool.icon || '🤖';
            document.getElementById('tool-name').textContent = currentTool.name;
            // 优先显示详细描述，如果没有则显示简单描述
            const description = currentTool.detailed_description || currentTool.description || currentTool.desc || '暂无描述';
            document.getElementById('tool-desc').textContent = description;
            document.getElementById('action-btn').href = currentTool.url || '#';
            
            // 渲染标签
            const badgesContainer = document.getElementById('tool-badges');
            const badges = [];
            
            if (currentTool.is_hot || currentTool.hot) {
                badges.push('<span class="badge hot">热门</span>');
            }
            
            if (currentTool.is_foreign || currentTool.foreign) {
                badges.push('<span class="badge foreign">国外</span>');
            }
            
            badgesContainer.innerHTML = badges.join('');
            
            // 获取相关工具（同分类的外部链接工具），最多显示5个
            const relatedTools = toolsData.filter(t => 
                t.category_id === currentTool.category_id && 
                t.id != toolId && 
                t.url &&
                t.url !== '#' && 
                t.url.trim() !== ''
            ).slice(0, 5);
            
            // 渲染相关工具
            const relatedContainer = document.getElementById('related-tools');
            
            if (relatedTools.length > 0) {
                relatedContainer.innerHTML = relatedTools.map(tool => `
                    <div class="tool-card" onclick="goToTool(${tool.id})">
                        ${tool.is_foreign || tool.foreign ? '<span class="card-badge foreign">国外</span>' : ''}
                        <div class="card-icon">${tool.icon || '🔧'}</div>
                        <span class="card-name">${tool.name}</span>
                        <p class="card-desc">${tool.description || tool.desc || ''}</p>
                    </div>
                `).join('');
            } else {
                relatedContainer.innerHTML = '<p style="text-align: center; color: var(--text-secondary); padding: 20px;">暂无相关工具推荐</p>';
            }
        }

        function goToTool(id) {
            window.location.href = `/tool?id=${id}`;
        }

        // 页面加载完成后渲染
        document.addEventListener('DOMContentLoaded', renderPage);
    </script>
</body>
</html>
