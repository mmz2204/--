<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">{{toolName}} - AI工具盒子</title>
    <meta name="description" id="meta-description" content="AI工具盒子提供优质在线工具，助力高效工作与创作">
    <meta name="keywords" id="meta-keywords" content="AI工具,在线工具,工具盒子">
    <!-- Open Graph -->
    <meta property="og:title" id="og-title" content="AI工具盒子">
    <meta property="og:description" id="og-description" content="汇聚全网优质AI工具">
    <meta property="og:url" id="og-url" content="https://tools.jinbox.cn">
    <meta property="og:type" content="website">
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" id="twitter-title" content="AI工具盒子">
    <meta name="twitter:description" id="twitter-description" content="汇聚全网优质AI工具">
    <!-- Canonical URL -->
    <link rel="canonical" id="canonical-url" href="https://tools.jinbox.cn">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            color-scheme: dark;
            --primary: #6366f1;
            --primary2: #8b5cf6;
            --bg-dark: #0f0f1a;
            --bg-card: #1a1a2e;
            --bg-card-hover: #252540;
            --text: #ffffff;
            --text-secondary: #94a3b8;
            --border: #2d2d44;
        }

        select {
            font: inherit;
            color: var(--text);
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
        }
        select option,
        select optgroup {
            background-color: #1e293b;
            color: #e2e8f0;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-dark);
            min-height: 100vh;
            color: var(--text);
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 20px;
        }
        
        /* Header */
        header {
            padding: 20px 0;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            background: rgba(15, 15, 26, 0.95);
            backdrop-filter: blur(10px);
            z-index: 100;
        }
        
        .header-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: var(--text);
        }
        
        .logo-icon {
            font-size: 28px;
        }
        
        .logo-text {
            font-size: 18px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--primary2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .back-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            text-decoration: none;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        
        .back-btn:hover {
            background: var(--bg-card-hover);
            border-color: var(--primary);
        }
        
        /* Hero Section */
        .hero {
            padding: 20px 0 10px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        .hero-top {
            display: flex;
            flex-wrap: wrap;
            align-items: flex-start;
            gap: 24px;
            justify-content: space-between;
        }
        
        .tool-content {
            flex: 1;
            min-width: 280px;
        }
        
        .tool-header {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .tool-icon {
            width: 70px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.2), rgba(139, 92, 246, 0.2));
            border-radius: 18px;
            border: 1px solid var(--border);
            flex-shrink: 0;
        }
        
        .tool-info {
            text-align: left;
        }
        
        .tool-name {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--primary2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 6px;
        }
        
        .tool-desc {
            font-size: 15px;
            color: var(--text-secondary);
            line-height: 1.8;
            max-width: 800px;
            margin: 12px 0 20px;
            text-align: left;
            padding: 16px 20px;
            background: rgba(99, 102, 241, 0.05);
            border-radius: 12px;
            border-left: 3px solid var(--primary);
        }
        
        .tool-badges {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 24px;
        }
        
        .badge {
            padding: 5px 14px;
            border-radius: 18px;
            font-size: 11px;
            font-weight: 500;
        }
        
        .badge.hot {
            background: linear-gradient(135deg, #f97316, #ef4444);
            color: #fff;
        }
        
        .badge.foreign {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: #fff;
        }
        
        .badge.domestic {
            background: linear-gradient(135deg, #10b981, #059669);
            color: #fff;
        }
        
        .usage-count {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 32px;
        }
        
        .action-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 32px;
            background: linear-gradient(135deg, var(--primary), var(--primary2));
            color: #fff;
            text-decoration: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.4);
        }
        
        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 30px rgba(99, 102, 241, 0.5);
        }
        
        .action-btn:active {
            transform: translateY(0);
        }
        
        /* Ad Section */
        .ad-section {
            margin: 12px 0 12px;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
        }
        
        .ad-link {
            text-decoration: none;
            color: inherit;
        }
        
        .ad-content {
            display: flex;
            align-items: center;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.1), rgba(139, 92, 246, 0.1));
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        
        .ad-content:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(99, 102, 241, 0.2);
            border-color: var(--primary);
        }
        
        .ad-image {
            flex-shrink: 0;
            width: 200px;
            height: 100px;
            overflow: hidden;
        }
        
        .ad-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .ad-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.2), rgba(139, 92, 246, 0.2));
        }
        
        .ad-icon {
            font-size: 36px;
            opacity: 0.6;
        }
        
        .ad-text {
            flex: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .ad-text h3 {
            font-size: 18px;
            font-weight: 600;
            background: linear-gradient(135deg, var(--primary), var(--primary2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 0;
        }
        
        .ad-text p {
            font-size: 14px;
            color: var(--text-secondary);
            margin: 0;
            line-height: 1.5;
        }
        
        /* Related Tools */
        .related-section {
            margin: 20px 0;
        }
        
        .section-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
        }
        
        .section-title::before {
            content: '';
            width: 3px;
            height: 16px;
            background: linear-gradient(180deg, var(--primary), var(--primary2));
            border-radius: 2px;
        }
        
        .tools-grid {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding-bottom: 8px;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }
        
        .tools-grid::-webkit-scrollbar {
            height: 6px;
        }
        
        .tools-grid::-webkit-scrollbar-track {
            background: transparent;
        }
        
        .tools-grid::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }
        
        .tool-card {
            flex-shrink: 0;
            width: 140px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        
        .tool-card:hover {
            background: var(--bg-card-hover);
            border-color: var(--primary);
            transform: translateY(-2px);
        }
        
        .card-icon {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            background: rgba(99, 102, 241, 0.15);
            border-radius: 10px;
            margin-bottom: 10px;
        }
        
        .card-name {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .card-desc {
            font-size: 11px;
            color: var(--text-secondary);
            line-height: 1.4;
            display: -webkit-box;
            display: box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
            box-orient: vertical;
            overflow: hidden;
        }
        
        .card-badge {
            position: absolute;
            top: 8px;
            right: 8px;
            padding: 1px 6px;
            border-radius: 6px;
            font-size: 9px;
            font-weight: 600;
        }
        
        .card-badge.foreign {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: #fff;
        }
        
        .tool-workspace {
            margin-top: 0;
            padding: 0;
            background: transparent;
            border-radius: 0;
            border: none;
        }
        
        .workspace-divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.15), transparent);
            margin: 20px 0;
        }
        
        .tool-workspace iframe {
            width: 100%;
            height: 500px;
            border: none;
            border-radius: 12px;
            background: #000;
        }
        
        .tool-content-placeholder {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }
        
        /* Footer */
        footer {
            padding: 40px 0;
            border-top: 1px solid var(--border);
            margin-top: 60px;
        }
        
        .footer-content {
            text-align: center;
            color: var(--text-secondary);
            font-size: 14px;
        }
        
        .footer-links {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        
        .footer-links a {
            color: var(--text-secondary);
            text-decoration: none;
            transition: color 0.3s ease;
        }
        
        .footer-links a:hover {
            color: var(--primary);
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .hero {
                padding: 40px 0;
            }
            
            .tool-name {
                font-size: 28px;
            }
            
            .tool-desc {
                font-size: 15px;
            }
            
            .action-btn {
                padding: 12px 24px;
                font-size: 15px;
            }
            
            .tools-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="container header-content">
            <a href="/" class="logo">
                <span class="logo-icon">✨</span>
                <span class="logo-text">AI工具盒子</span>
            </a>
            <a href="#" class="back-btn" id="back-btn" onclick="handleBack()">
                <span>←</span>
                <span>返回</span>
            </a>
        </div>
    </header>

    <main class="container">
        <section class="hero">
            <div class="hero-top">
                <div class="tool-header">
                    <div class="tool-icon" id="tool-icon">🤖</div>
                    <div class="tool-info">
                        <h1 class="tool-name" id="tool-name">工具名称</h1>
                    </div>
                </div>
                
                <a href="#" class="action-btn" id="action-btn" target="_blank" rel="noopener noreferrer">
                    <span>🚀</span>
                    <span>使用入口</span>
                </a>
            </div>
            
            <p class="tool-desc" id="tool-desc">工具描述将显示在这里，大约100字左右，介绍该工具的主要功能和特点。</p>
            
            <div class="tool-badges" id="tool-badges"></div>
            
            <!-- 本站工具操作区域 - 与上方合并为一体 -->
            <div id="tool-workspace" class="tool-workspace" style="display: none;">
                <div class="workspace-divider"></div>
                <div id="tool-content"></div>
            </div>
        </section>

        <!-- 广告预留区域 -->
        <section class="ad-section">
            <a href="/" class="ad-link">
                <div class="ad-content">
                    <div class="ad-image">
                        <div class="ad-placeholder">
                            <span class="ad-icon">💡</span>
                        </div>
                    </div>
                    <div class="ad-text">
                        <h3>✨ AI工具盒子</h3>
                        <p>汇聚全网优质AI工具，助力高效工作与创作</p>
                    </div>
                </div>
            </a>
        </section>

        <!-- 相关工具推荐 -->
        <section class="related-section">
            <h2 class="section-title">推荐工具</h2>
            <div class="tools-grid" id="related-tools">
                <!-- 动态加载相关工具 -->
            </div>
        </section>
    </main>

    <footer>
        <div class="container footer-content">
            <div class="footer-links">
                <a href="#">关于我们</a>
                <a href="#">使用协议</a>
                <a href="#">隐私政策</a>
                <a href="#">联系我们</a>
            </div>
            <p>© 2024 AI工具盒子 - 汇聚优质AI工具</p>
        </div>
    </footer>

    <script>
        // 获取URL参数
        function getParam(name) {
            const params = new URLSearchParams(window.location.search);
            return params.get(name);
        }

        // 获取工具数据
        async function loadToolsData() {
            try {
                const response = await fetch('/data.json');
                const data = await response.json();
                return data.tools || [];
            } catch (error) {
                console.error('加载工具数据失败:', error);
                return [];
            }
        }

        // 记录浏览历史
        async function recordToolVisit(tool) {
            const isLoggedIn = !!localStorage.getItem('admin_token');
            const recentIds = JSON.parse(localStorage.getItem('recent') || '[]');
            const newRecent = [tool.id, ...recentIds.filter(x => x !== tool.id)].slice(0, 10);
            localStorage.setItem('recent', JSON.stringify(newRecent));

            if (isLoggedIn) {
                try {
                    await fetch('/api/history', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': 'Bearer ' + localStorage.getItem('admin_token')
                        },
                        body: JSON.stringify({
                            tool_id: tool.id,
                            tool_name: tool.name,
                            tool_icon: tool.icon
                        })
                    });
                } catch (error) {
                    console.error('保存浏览历史失败:', error);
                }
            } else {
                const history = JSON.parse(localStorage.getItem('local_history') || '[]');
                const newHistory = [{
                    id: Date.now(),
                    tool_id: tool.id,
                    tool_name: tool.name,
                    tool_icon: tool.icon,
                    created_at: new Date().toISOString()
                }, ...history.filter(h => h.tool_id !== tool.id)].slice(0, 10);
                localStorage.setItem('local_history', JSON.stringify(newHistory));
            }
        }

        // 设置SEO标签
        function setSeoTags(tool) {
            const description = tool.detailed_description || tool.description || tool.desc || '';
            const keywords = [tool.name, '在线工具', 'AI工具', '工具盒子'];
            
            // 设置页面标题
            const pageTitle = tool.name + ' - AI工具盒子';
            document.title = pageTitle;
            document.getElementById('page-title').textContent = pageTitle;
            
            // 设置描述
            document.getElementById('meta-description').content = description || 'AI工具盒子提供优质在线工具，助力高效工作与创作';
            
            // 设置关键词
            document.getElementById('meta-keywords').content = keywords.join(',');
            
            // 设置Open Graph
            document.getElementById('og-title').content = pageTitle;
            document.getElementById('og-description').content = description || '汇聚全网优质AI工具';
            document.getElementById('og-url').content = window.location.href;
            
            // 设置Twitter Card
            document.getElementById('twitter-title').content = pageTitle;
            document.getElementById('twitter-description').content = description || '汇聚全网优质AI工具';
            
            // 设置Canonical URL
            document.getElementById('canonical-url').href = window.location.href;
            
            // 添加结构化数据（Schema.org）
            addSchemaMarkup(tool);
        }
        
        // 添加Schema.org结构化数据
        function addSchemaMarkup(tool) {
            const schema = {
                "@context": "https://schema.org",
                "@type": "WebApplication",
                "name": tool.name,
                "description": tool.detailed_description || tool.description || tool.desc || '',
                "url": window.location.href,
                "applicationCategory": "ProductivityApplication"
            };
            
            // 移除已存在的schema script
            const existingSchema = document.getElementById('schema-script');
            if (existingSchema) {
                existingSchema.remove();
            }
            
            // 创建新的schema script
            const script = document.createElement('script');
            script.id = 'schema-script';
            script.type = 'application/ld+json';
            script.textContent = JSON.stringify(schema);
            document.head.appendChild(script);
        }

        // 渲染页面
        async function renderPage() {
            const toolsData = await loadToolsData();
            
            // 获取当前工具ID（支持多种URL格式）
            const urlParams = new URLSearchParams(window.location.search);
            let toolId = urlParams.get('id');
            
            if (!toolId) {
                // 尝试从URL路径获取ID（支持 /tool/{id} 和 /tool/{id}/{slug}）
                const pathParts = window.location.pathname.split('/');
                if (pathParts.length >= 3 && pathParts[1] === 'tool') {
                    toolId = pathParts[2];
                }
            }
            
            if (!toolId) {
                window.location.href = '/';
                return;
            }
            
            // 查找当前工具
            const currentTool = toolsData.find(t => t.id == toolId);
            
            if (!currentTool) {
                window.location.href = '/';
                return;
            }
            
            // 设置SEO标签
            setSeoTags(currentTool);
            
            // 记录浏览历史
            recordToolVisit(currentTool);
            
            // 保存当前工具的分类信息，用于返回时选中对应导航
            if (currentTool.category_id) {
                localStorage.setItem('lastToolCategoryId', String(currentTool.category_id));
            }
            
            // 渲染当前工具信息
            document.getElementById('tool-icon').textContent = currentTool.icon || '🤖';
            document.getElementById('tool-name').textContent = currentTool.name;
            // 优先显示详细描述，如果没有则显示简单描述
            const description = currentTool.detailed_description || currentTool.description || currentTool.desc || '暂无描述';
            document.getElementById('tool-desc').textContent = description;
            
            // 根据工具类型设置操作按钮
            const actionBtn = document.getElementById('action-btn');
            const toolWorkspace = document.getElementById('tool-workspace');
            const toolContent = document.getElementById('tool-content');
            
            if (currentTool.type === 1 || currentTool.type === '1') {
                // 外部链接工具 - 跳转到外部URL
                actionBtn.href = currentTool.url || '#';
                actionBtn.innerHTML = '<span>🚀</span><span>使用入口</span>';
                actionBtn.target = '_blank';
                actionBtn.rel = 'noopener noreferrer';
                toolWorkspace.style.display = 'none';
            } else if (currentTool.type === 3 || currentTool.type === '3') {
                // 本站链接工具 - 跳转到本站其他页面
                actionBtn.href = currentTool.url ? ('/' + currentTool.url) : '#';
                actionBtn.innerHTML = '<span>🔗</span><span>访问页面</span>';
                actionBtn.target = '_self';
                actionBtn.rel = '';
                toolWorkspace.style.display = 'none';
            } else {
                // 本站工具 - 在页面内显示工具操作区域
                actionBtn.style.display = 'none';
                toolWorkspace.style.display = 'block';
                
                // 根据工具ID加载对应的工具内容
                loadToolContent(currentTool.id, toolContent);
            }
            
            // 渲染标签
            const badgesContainer = document.getElementById('tool-badges');
            const badges = [];
            
            if (currentTool.is_hot || currentTool.hot) {
                badges.push('<span class="badge hot">热门</span>');
            }
            
            if (currentTool.is_foreign || currentTool.foreign) {
                badges.push('<span class="badge foreign">国外</span>');
            }
            
            if (currentTool.type === 2 || currentTool.type === '2') {
                badges.push('<span class="badge domestic">本站工具</span>');
            }
            
            badgesContainer.innerHTML = badges.join('');
            
            // 获取相关工具（同分类的工具），最多显示5个
            const relatedTools = toolsData.filter(t => 
                t.category_id === currentTool.category_id && 
                t.id != toolId && 
                (t.url && t.url !== '#' && t.url.trim() !== '' || t.type === 2)
            ).slice(0, 5);
            
            // 渲染相关工具
            const relatedContainer = document.getElementById('related-tools');
            
            if (relatedTools.length > 0) {
                relatedContainer.innerHTML = relatedTools.map(tool => {
                    const slug = generateSlug(tool.name);
                    const toolUrl = `/tool/${tool.id}/${slug}`;
                    return `
                        <div class="tool-card" onclick="goToTool(${tool.id}, '${slug}')">
                            ${tool.is_foreign || tool.foreign ? '<span class="card-badge foreign">国外</span>' : ''}
                            ${tool.type === 2 || tool.type === '2' ? '<span class="card-badge domestic">本站</span>' : ''}
                            <div class="card-icon">${tool.icon || '🔧'}</div>
                            <span class="card-name">${tool.name}</span>
                            <p class="card-desc">${tool.description || tool.desc || ''}</p>
                        </div>
                    `;
                }).join('');
            } else {
                relatedContainer.innerHTML = '<p style="text-align: center; color: var(--text-secondary); padding: 20px;">暂无相关工具推荐</p>';
            }
        }

        // 加载本站工具内容
        async function loadToolContent(toolId, container) {
            // 根据工具ID加载对应的工具功能
            const toolContentMap = {
                // JSON格式化工具
                667: () => loadJsonFormatter(container),
                // Base64编码解码工具
                668: () => loadBase64Tool(container),
                // UUID 生成器（与首页工具视觉一致）
                730: () => loadUUIDTool(container),
                // 时间戳转换工具
                // ... 其他工具
            };
            
            const loader = toolContentMap[toolId] || toolContentMap[String(toolId)];
            if (loader) {
                loader();
            } else {
                container.innerHTML = '<div class="tool-content-placeholder">该工具功能正在开发中...</div>';
            }
        }
        
        // JSON格式化工具
        function loadJsonFormatter(container) {
            container.innerHTML = `
                <style>
                    .json-formatter { display: flex; gap: 16px; }
                    .json-panel { flex: 1; display: flex; flex-direction: column; gap: 8px; }
                    .json-panel textarea {
                        width: 100%;
                        height: 300px;
                        padding: 14px;
                        background: rgba(0, 0, 0, 0.3);
                        border: 1px solid var(--border);
                        border-radius: 12px;
                        color: var(--text);
                        font-family: monospace;
                        font-size: 13px;
                        resize: vertical;
                    }
                    .json-panel textarea:focus { outline: none; border-color: var(--primary); }
                    .json-panel label { font-size: 13px; color: var(--text-secondary); }
                    .json-actions { display: flex; gap: 10px; margin-top: 8px; }
                    .json-btn {
                        padding: 8px 16px;
                        background: var(--primary);
                        color: #fff;
                        border: none;
                        border-radius: 8px;
                        cursor: pointer;
                        font-size: 13px;
                        transition: all 0.3s;
                    }
                    .json-btn:hover { transform: translateY(-1px); }
                    .json-btn.secondary { background: rgba(255, 255, 255, 0.1); }
                </style>
                <div class="json-formatter">
                    <div class="json-panel">
                        <label>输入JSON</label>
                        <textarea id="json-input" placeholder="请输入JSON数据..."></textarea>
                        <div class="json-actions">
                            <button class="json-btn" onclick="formatJson()">格式化</button>
                            <button class="json-btn secondary" onclick="minifyJson()">压缩</button>
                        </div>
                    </div>
                    <div class="json-panel">
                        <label>输出结果</label>
                        <textarea id="json-output" readonly placeholder="结果将显示在这里..."></textarea>
                        <div class="json-actions">
                            <button class="json-btn secondary" onclick="copyJson()">复制结果</button>
                        </div>
                    </div>
                </div>
            `;
        }
        
        function formatJson() {
            const input = document.getElementById('json-input').value;
            try {
                const parsed = JSON.parse(input);
                document.getElementById('json-output').value = JSON.stringify(parsed, null, 4);
            } catch (e) {
                alert('JSON格式错误: ' + e.message);
            }
        }
        
        function minifyJson() {
            const input = document.getElementById('json-input').value;
            try {
                const parsed = JSON.parse(input);
                document.getElementById('json-output').value = JSON.stringify(parsed);
            } catch (e) {
                alert('JSON格式错误: ' + e.message);
            }
        }
        
        function copyJson() {
            const output = document.getElementById('json-output');
            output.select();
            document.execCommand('copy');
            alert('已复制到剪贴板');
        }
        
        // Base64编码解码工具
        function loadBase64Tool(container) {
            container.innerHTML = `
                <style>
                    .base64-tool { display: flex; gap: 16px; }
                    .base64-panel { flex: 1; display: flex; flex-direction: column; gap: 8px; }
                    .base64-panel textarea {
                        width: 100%;
                        height: 300px;
                        padding: 14px;
                        background: rgba(0, 0, 0, 0.3);
                        border: 1px solid var(--border);
                        border-radius: 12px;
                        color: var(--text);
                        font-family: monospace;
                        font-size: 13px;
                        resize: vertical;
                    }
                    .base64-panel textarea:focus { outline: none; border-color: var(--primary); }
                    .base64-panel label { font-size: 13px; color: var(--text-secondary); }
                    .base64-actions { display: flex; gap: 10px; margin-top: 8px; }
                    .base64-btn {
                        padding: 8px 16px;
                        background: var(--primary);
                        color: #fff;
                        border: none;
                        border-radius: 8px;
                        cursor: pointer;
                        font-size: 13px;
                        transition: all 0.3s;
                    }
                    .base64-btn:hover { transform: translateY(-1px); }
                    .base64-btn.secondary { background: rgba(255, 255, 255, 0.1); }
                </style>
                <div class="base64-tool">
                    <div class="base64-panel">
                        <label>输入文本</label>
                        <textarea id="base64-input" placeholder="请输入要编码/解码的文本..."></textarea>
                        <div class="base64-actions">
                            <button class="base64-btn" onclick="encodeBase64()">编码</button>
                            <button class="base64-btn secondary" onclick="decodeBase64()">解码</button>
                        </div>
                    </div>
                    <div class="base64-panel">
                        <label>输出结果</label>
                        <textarea id="base64-output" readonly placeholder="结果将显示在这里..."></textarea>
                        <div class="base64-actions">
                            <button class="base64-btn secondary" onclick="copyBase64()">复制结果</button>
                        </div>
                    </div>
                </div>
            `;
        }
        
        function encodeBase64() {
            const input = document.getElementById('base64-input').value;
            const encoded = btoa(encodeURIComponent(input));
            document.getElementById('base64-output').value = encoded;
        }
        
        function decodeBase64() {
            const input = document.getElementById('base64-input').value;
            try {
                const decoded = decodeURIComponent(atob(input));
                document.getElementById('base64-output').value = decoded;
            } catch (e) {
                alert('Base64格式错误');
            }
        }
        
        function copyBase64() {
            const output = document.getElementById('base64-output');
            output.select();
            document.execCommand('copy');
            alert('已复制到剪贴板');
        }

        function loadUUIDTool(container) {
            container.innerHTML = `
                <div class="uuid-tool-wrap" style="padding:16px;border-radius:12px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.06);">
                    <div style="font-size:14px;color:#94a3b8;margin-bottom:10px;">生成结果</div>
                    <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px;">
                        <button type="button" onclick="generateUUID()" style="padding:10px 20px;border:none;border-radius:10px;cursor:pointer;font-size:14px;font-weight:600;color:#fff;background:linear-gradient(135deg,#6366f1,#06b6d4);">生成 UUID</button>
                        <button type="button" onclick="copyUUID()" style="padding:10px 20px;border:1px solid rgba(255,255,255,0.15);border-radius:10px;cursor:pointer;font-size:14px;font-weight:500;color:#e2e8f0;background:rgba(255,255,255,0.08);">复制</button>
                    </div>
                    <textarea id="uuid-output" rows="4" readonly placeholder="点击上方按钮生成 UUID"
                        style="width:100%;min-height:100px;padding:12px 14px;font-family:ui-monospace,Consolas,monospace;font-size:14px;line-height:1.5;border-radius:10px;box-sizing:border-box;resize:vertical;border:1px solid rgba(255,255,255,0.12);background:rgba(0,0,0,0.35);color:#e2e8f0;box-shadow:inset 0 2px 10px rgba(0,0,0,0.35);-webkit-appearance:none;appearance:none;"></textarea>
                </div>
            `;
        }

        function generateUUID() {
            const el = document.getElementById('uuid-output');
            if (!el) return;
            const uuid = 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                const r = Math.random() * 16 | 0;
                const v = c === 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
            el.value = uuid;
        }

        function copyUUID() {
            const output = document.getElementById('uuid-output');
            if (!output || !output.value) return;
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(output.value).then(function() {
                    alert('已复制到剪贴板');
                }).catch(function() {
                    output.select();
                    document.execCommand('copy');
                    alert('已复制到剪贴板');
                });
            } else {
                output.select();
                document.execCommand('copy');
                alert('已复制到剪贴板');
            }
        }
        
        // 返回首页并定位到对应分类
        function handleBack() {
            const categoryId = localStorage.getItem('lastToolCategoryId');
            if (categoryId) {
                window.location.href = `/#cat-section_${categoryId}`;
            } else {
                window.location.href = '/';
            }
        }

        // 生成URL友好的slug
        function generateSlug(name) {
            if (!name) return '';
            return name
                .toLowerCase()
                .replace(/[\u4e00-\u9fa5]/g, (char) => {
                    const pinyinMap = {
                        '的': 'de', '是': 'shi', '在': 'zai', '有': 'you', '和': 'he', '了': 'le',
                        '我': 'wo', '不': 'bu', '人': 'ren', '都': 'dou', '一': 'yi', '一个': 'yi-ge',
                        '上': 'shang', '也': 'ye', '很': 'hen', '到': 'dao', '说': 'shuo', '要': 'yao',
                        '去': 'qu', '你': 'ni', '会': 'hui', '着': 'zhe', '没有': 'mei-you', '看': 'kan',
                        '好': 'hao', '自己': 'zi-ji', '这': 'zhe', '那': 'na', '能': 'neng', '可能': 'ke-neng',
                        'JSON': 'json', 'AI': 'ai', 'GPT': 'gpt', 'URL': 'url', 'Base64': 'base64',
                        'PDF': 'pdf', 'Word': 'word', 'Excel': 'excel', 'HTML': 'html', 'CSS': 'css',
                        'XML': 'xml', 'API': 'api', 'HTTP': 'http', 'HTTPS': 'https', 'FTP': 'ftp'
                    };
                    return pinyinMap[name] || char;
                })
                .replace(/[^a-z0-9\u4e00-\u9fa5-]+/g, '-')
                .replace(/-{2,}/g, '-')
                .replace(/^-|-$/g, '');
        }

        function goToTool(id, slug) {
            const toolSlug = slug || generateSlug('');
            window.location.href = `/tool/${id}/${toolSlug}`;
        }

        // 页面加载完成后渲染
        document.addEventListener('DOMContentLoaded', renderPage);
    </script>
</body>
</html>
